<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>¿Me perdonas?</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Dancing Script', cursive;
text-align:center;
background:linear-gradient(#ffd6e7,#ffffff);
overflow:hidden;
}

h1{
color:#ff4fa3;
margin-top:40px;
font-size:45px;
}

button{
padding:14px 30px;
font-size:22px;
border:none;
border-radius:10px;
cursor:pointer;
margin:15px;
font-family:'Dancing Script', cursive;
}

#yes{
background:#2ecc71;
color:white;
}

#no{
background:#e74c3c;
color:white;
position:absolute;
}

.heart{
position:fixed;
top:-20px;
font-size:26px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

</style>
</head>

<body>

<h1>¿Me perdonas? 🥺</h1>

<div>
<button id="yes">Sí</button>
<button id="no">No</button>
</div>

<script>

window.onload=function(){

let noBtn=document.getElementById("no")
let yesBtn=document.getElementById("yes")

// Botón NO se mueve
noBtn.addEventListener("mouseover",function(){

let x=Math.random()*window.innerWidth*0.7
let y=Math.random()*window.innerHeight*0.7

noBtn.style.left=x+"px"
noBtn.style.top=y+"px"

})

// 🌟 Solo corazones después del Sí
function createHeart(){

let hearts=["🌟","💝","💘"]

let h=document.createElement("div")
h.className="heart"
h.innerHTML=hearts[Math.floor(Math.random()*hearts.length)]

h.style.left=Math.random()*100+"vw"
h.style.animationDuration=(Math.random()*3+2)+"s"

document.body.appendChild(h)

setTimeout(()=>h.remove(),5000)
}

// Botón SÍ → frase + video + corazones
yesBtn.onclick=function(){

document.body.innerHTML=`

<h1 style="color:#ff4fa3;margin-top:60px;">
Voy a poner todo de mí, no te lo prometo, te lo demostraré ❤️
</h1>

<iframe width="560" height="315"
src="https://www.youtube.com/embed/n2Cld9aU1vU?autoplay=1"
frameborder="0"
allow="autoplay"
allowfullscreen>
</iframe>

`

// iniciar lluvia de corazones
setInterval(createHeart,200)

}

// Botón NO se mueve
noBtn.addEventListener("mouseover",function(){

let x=Math.random()*window.innerWidth*0.7
let y=Math.random()*window.innerHeight*0.7

noBtn.style.left=x+"px"
noBtn.style.top=y+"px"

})

}

</script>

</body>
</html>
<!-- forzar reconstrucción -->
